<!doctype html>
<html lang="en" class="dark">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>OpenIssue - Redirecting...</title>
    <script>
      // Check if user is authenticated via session parameter
      const params = new URLSearchParams(window.location.search);
      const sessionId = params.get("session");

      // Get session from localStorage if available
      const storedSession = localStorage.getItem("session_id");
      const targetSession = sessionId || storedSession;

      if (targetSession) {
        // Store session and redirect to dashboard
        localStorage.setItem("session_id", targetSession);
        window.location.href = "pages/dashboard.html?session=" + targetSession;
      } else {
        // No session, redirect to login
        window.location.href = "pages/login.html";
      }
    </script>
  </head>
  <body>
    <p>Redirecting to OpenIssue...</p>
  </body>
</html>
